<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>QR Code — Ray Galo 135</title>
<style>
  @media print {
    body { background: white !important; }
    .card { box-shadow: none !important; border: 2px solid #0A6EBD !important; }
  }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; margin: 0;
    background: linear-gradient(180deg, #E3F2FD 0%, #F5FAFE 100%);
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 2rem;
    text-align: center;
    box-shadow: 0 4px 24px rgba(42,27,92,0.15);
    max-width: 320px;
    border: 3px solid #FFEB3B;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -10px; right: -10px;
    width: 80px; height: 80px;
    background-image: radial-gradient(circle, #0A6EBD 2px, transparent 2px);
    background-size: 10px 10px;
    opacity: 0.3;
  }
  .logo-sol {
    width: 110px; height: 110px;
    background: white;
    border-radius: 50%;
    margin: 0 auto 0.5rem;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    border: 3px solid #FFEB3B;
    box-shadow: 0 0 20px rgba(255,215,0,0.4);
    padding: 6px;
  }
  .logo-sol img { width: 100%; height: 100%; object-fit: contain; }
  h1 {
    color: #0A6EBD;
    font-size: 1.3rem;
    margin: 0.3rem 0 0.1rem;
    letter-spacing: 0.05em;
    font-weight: 900;
  }
  .numero {
    color: #4DA8DA;
    font-size: 0.9rem;
    font-weight: bold;
    margin-bottom: 0.6rem;
  }
  .frases { margin: 0.8rem 0 1rem; }
  .frase { font-size: 0.8rem; margin: 4px 0; }
  .frase-pt { color: #0A6EBD; font-weight: 600; }
  .frase-en, .frase-es { color: #888; }
  img.qr {
    width: 220px; height: 220px;
    border: 2px solid #FFEB3B;
    border-radius: 8px;
    padding: 4px;
    background: white;
  }
  .link {
    font-size: 0.7rem;
    color: #4DA8DA;
    margin-top: 0.75rem;
    word-break: break-all;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-sol"><img src="https://i.imgur.com/AYn1Dhl.png" alt="Ray Galo 135"></div>
    <h1>RAY GALO</h1>
    <div class="numero">— 135 —</div>
    <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://ray-galo-135.vercel.app&color=0A6EBD&bgcolor=ffffff&qzone=2&format=png" alt="QR Code Ray Galo 135">
    <div class="frases">
      <p class="frase frase-pt">📱 Escaneie para ver o cardápio digital</p>
      <p class="frase frase-en">📱 Scan to see the digital menu</p>
      <p class="frase frase-es">📱 Escanea para ver el menú digital</p>
    </div>
  </div>
</body>
</html>
